<!DOCTYPE html>
<html>
<body onload="myFunction()">

<h1>Hello World!</h1>

<script>
function myFunction() {
  let loadTime = performance.timing.loadEventStart - performance.timing.navigationStart;
  let unloadTime = performance.timing.unloadEventEnd - performance.timing.unloadEventStart;

  let responseTime = performance.timing.responseEnd - performance.timing.navigationStart;
  
  alert("performance.timing.loadEventStart - performance.timing.navigationStart: " + loadTime +
    "\nperformance.timing.unloadEventEnd - performance.timing.unloadEventStart: " + unloadTime +
    "\nperformance.timing.responseEnd - performance.timing.navigationStart: " + responseTime);

  
}
</script>

</body>
</html>
