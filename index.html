<!DOCTYPE html>
<html>
<body onload="myFunction()">

<h1>Hello World!</h1>

<script>
function myFunction() {
  let loadTime = performance.timing.loadEventStart - performance.timing.navigationStart;
  let unloadTime = performance.timing.unloadEventEnd - performance.timing.unloadEventStart;

  let responseTime = performance.timing.responseEnd - performance.timing.responseStart;
  let fetchToResponse = performance.timing.responseStart - performance.timing.fetchStart;
  let requestTime = performance.timing.responseStart - performance.timing.requestStart;
  let appCacheAndDns = performance.timing.domainLookupEnd - performance.timing.fetchStart;

  alert("performance.timing.loadEventStart - performance.timing.navigationStart: " + loadTime +
    "\nperformance.timing.unloadEventEnd - performance.timing.unloadEventStart: " + unloadTime +
    "\nperformance.timing.responseEnd - performance.timing.responseStart: " + responseTime +
    "\nfetchToResponse: " + fetchToResponse + " requestTime: " + requestTime + " appCacheAndDns: " + appCacheAndDns);


}
</script>

</body>
</html>
